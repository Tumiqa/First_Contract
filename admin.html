<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Aloo Admin Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1e1e2f; color: white; padding: 40px; display: flex; justify-content: center; }
        .dashboard { background: #2a2a40; padding: 30px; border-radius: 15px; width: 600px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #00d2ff; text-align: center; border-bottom: 1px solid #3a3a5c; padding-bottom: 15px; }
        .wallet-box { background: #32324e; padding: 20px; border-radius: 10px; margin-top: 20px; }
        .stat { display: flex; justify-content: space-between; font-size: 18px; margin: 15px 0; padding-bottom: 10px; border-bottom: 1px dashed #555; }
        .stat span { font-weight: bold; color: #4ade80; }
        .eth-val { color: #facc15 !important; }
        .btn-refresh { width: 100%; padding: 15px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-refresh:hover { background: #2563eb; }
        .link { color: #818cf8; text-decoration: none; font-size: 14px; display: block; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

<div class="dashboard">
    <h2>Hệ Thống Kế Toán - Master Wallet</h2>
    
    <div class="wallet-box">
        <p style="color: #aaa; font-size: 14px; text-align: center;">Địa chỉ Ví Tổng (Paymaster & Nguồn JPYC)</p>
        <p style="text-align: center; font-family: monospace; background: #1e1e2f; padding: 10px; border-radius: 5px;" id="adminAddress">Đang tải...</p>
        
        <div class="stat">
            Quỹ Sepolia ETH (Trả phí Gas): <span id="ethBalance" class="eth-val">0.0000 ETH</span>
        </div>
        <div class="stat">
            Quỹ JPYC Khả dụng: <span id="jpycBalance">0.00 JPYC</span>
        </div>
    </div>

    <button class="btn-refresh" onclick="fetchBalances()">🔄 Cập nhật Số dư On-chain</button>
    
    <a href="#" id="etherscanLink" target="_blank" class="link">🔍 Tra cứu Ví trên Sepolia Etherscan</a>
</div>

<script type="module">
    import { ethers } from "https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.min.js";

    // CẤU HÌNH THÔNG SỐ SEPOLIA
    const ALCHEMY_URL = "https://eth-sepolia.g.alchemy.com/v2/grgjw1ZoCe7BqANEH_DS3";
    const MASTER_WALLET = "0x4f541E2DD031d7A1Ff1E8c58B121775487669e5f"; // Địa chỉ khớp với SEPOLIA_PRIVATE_KEY
    const JPYC_ADDRESS = "0x782f6323c6d40a4b6f34adbaf27cfba441ec072e"; // Vừa deploy
    
    const jpycAbi = ["function balanceOf(address account) view returns (uint256)"];

    document.getElementById('adminAddress').innerText = MASTER_WALLET;
    document.getElementById('etherscanLink').href = `https://sepolia.etherscan.io/address/${MASTER_WALLET}`;

    window.fetchBalances = async () => {
        try {
            const provider = new ethers.JsonRpcProvider(ALCHEMY_URL);
            
            // Lấy số dư ETH (Dùng làm Gas)
            const ethBal = await provider.getBalance(MASTER_WALLET);
            document.getElementById('ethBalance').innerText = parseFloat(ethers.formatEther(ethBal)).toFixed(4) + " ETH";

            // Lấy số dư JPYC
            const jpycContract = new ethers.Contract(JPYC_ADDRESS, jpycAbi, provider);
            const jpycBal = await jpycContract.balanceOf(MASTER_WALLET);
            document.getElementById('jpycBalance').innerText = parseFloat(ethers.formatEther(jpycBal)).toFixed(2) + " JPYC";
            
        } catch (error) {
            console.error("Lỗi:", error);
            alert("Lỗi khi kết nối Blockchain!");
        }
    };

    // Tự động tải lần đầu
    fetchBalances();
</script>
</body>
</html>
